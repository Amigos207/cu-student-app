name: cu_student_app
description: CU Student Portal
publish_to: 'none'
version: 2.0.2+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Core ────────────────────────────────────────────────────────
  html: ^0.15.4
  http: ^1.2.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.0
  path_provider: ^2.1.2
  url_launcher: ^6.3.0

  # ── Авто-установка APK ──────────────────────────────────────────
  open_file: ^3.3.2
  permission_handler: ^11.3.0

  # ── Локальные уведомления ───────────────────────────────────────
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#2A5490"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/schedule.html
    - assets/attendance.html
    - assets/icon/